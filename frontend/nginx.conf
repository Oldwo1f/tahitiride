# Tahiti Ride frontend — nginx serves the static PWA and reverse-proxies
# /api/** and /socket.io/** to the backend container so the browser talks
# to a single origin (no CORS, one exposed port).

upstream tahiti_backend {
    server backend:3001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---- Basics ----
    client_max_body_size 10M;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        application/javascript
        application/json
        application/manifest+json
        application/xml
        image/svg+xml
        text/css
        text/plain;

    # ---- PWA: never cache the service worker or manifest ----
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires 0;
        try_files $uri =404;
    }

    location ~* ^/workbox-[^/]+\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires 0;
        try_files $uri =404;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires 0;
        try_files $uri =404;
    }

    # ---- Reverse proxy to the NestJS backend ----
    location /api/ {
        proxy_pass http://tahiti_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Socket.IO: requires WS upgrade + long idle timeouts
    location /socket.io/ {
        proxy_pass http://tahiti_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location = /health {
        proxy_pass http://tahiti_backend/health;
        access_log off;
    }

    # ---- Long-cache immutable hashed assets ----
    location /_nuxt/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    # ---- Images, fonts, icons: moderate cache ----
    location ~* \.(?:png|jpe?g|gif|svg|webp|ico|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public" always;
        access_log off;
        try_files $uri =404;
    }

    # ---- SPA fallback: every unknown route → index.html ----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
