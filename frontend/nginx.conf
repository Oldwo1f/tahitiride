# Tahiti Ride frontend — serves the static PWA only.
# All API and Socket.IO traffic goes directly from the browser to the backend
# subdomain (PUBLIC_API_DOMAIN), routed by Traefik. Nginx here does not proxy
# anything; it just serves files and falls back to index.html for SPA routes.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---- Basics ----
    client_max_body_size 10M;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        application/javascript
        application/json
        application/manifest+json
        application/xml
        image/svg+xml
        text/css
        text/plain;

    # ---- PWA: never cache the service worker or manifest ----
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires 0;
        try_files $uri =404;
    }

    location ~* ^/workbox-[^/]+\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires 0;
        try_files $uri =404;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires 0;
        try_files $uri =404;
    }

    # ---- Long-cache immutable hashed assets ----
    location /_nuxt/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    # ---- Images, fonts, icons: moderate cache ----
    location ~* \.(?:png|jpe?g|gif|svg|webp|ico|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public" always;
        access_log off;
        try_files $uri =404;
    }

    # ---- SPA fallback: every unknown route → index.html ----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
