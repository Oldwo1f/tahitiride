services:
  db:
    image: postgis/postgis:16-3.4
    container_name: tahiti_ride_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DATABASE_USER:-tahiti}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-tahiti}
      POSTGRES_DB:       ${DATABASE_NAME:-tahiti_ride}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Uncomment to reach the DB from the host (psql, pgAdmin, dev):
    # ports:
    #   - "5432:5432"
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-tahiti} -d ${DATABASE_NAME:-tahiti_ride}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - tahiti_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: tahiti-ride-backend:latest
    container_name: tahiti_ride_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001

      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER:     ${DATABASE_USER:-tahiti}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-tahiti}
      DATABASE_NAME:     ${DATABASE_NAME:-tahiti_ride}

      JWT_SECRET:     ${JWT_SECRET:?JWT_SECRET is required in .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}

      MAPBOX_TOKEN: ${MAPBOX_TOKEN:-}

      FARE_BASE_XPF:              ${FARE_BASE_XPF:-200}
      FARE_PER_KM_XPF:            ${FARE_PER_KM_XPF:-100}
      INITIAL_WALLET_BALANCE_XPF: ${INITIAL_WALLET_BALANCE_XPF:-10000}

      CORS_ORIGIN:                   ${CORS_ORIGIN:-*}
      QR_ROTATION_SECONDS:           ${QR_ROTATION_SECONDS:-60}
      PICKUP_MAX_DISTANCE_METERS:    ${PICKUP_MAX_DISTANCE_METERS:-50}
      NEARBY_DRIVERS_RADIUS_METERS:  ${NEARBY_DRIVERS_RADIUS_METERS:-3000}
    # Uncomment to expose the API directly on the host (debug / external client):
    # ports:
    #   - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - tahiti_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Same-origin deployment: nginx proxies /api and /socket.io to the
        # backend container, so the PWA talks to itself. Leave empty.
        NUXT_PUBLIC_API_BASE:    ""
        NUXT_PUBLIC_SOCKET_URL:  ""
        NUXT_PUBLIC_MAPBOX_TOKEN: ${NUXT_PUBLIC_MAPBOX_TOKEN:?NUXT_PUBLIC_MAPBOX_TOKEN is required at build time}
    image: tahiti-ride-frontend:latest
    container_name: tahiti_ride_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - tahiti_net

volumes:
  pgdata:

networks:
  tahiti_net:
    driver: bridge
