services:
  db:
    image: postgis/postgis:16-3.4
    container_name: tahiti_ride_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DATABASE_USER:-tahiti}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-tahiti}
      POSTGRES_DB:       ${DATABASE_NAME:-tahiti_ride}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-tahiti} -d ${DATABASE_NAME:-tahiti_ride}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - tahiti_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: tahiti-ride-backend:latest
    container_name: tahiti_ride_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001

      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER:     ${DATABASE_USER:-tahiti}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-tahiti}
      DATABASE_NAME:     ${DATABASE_NAME:-tahiti_ride}

      JWT_SECRET:     ${JWT_SECRET:?JWT_SECRET is required in .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}

      MAPBOX_TOKEN: ${MAPBOX_TOKEN:-}

      FARE_BASE_XPF:              ${FARE_BASE_XPF:-200}
      FARE_PER_KM_XPF:            ${FARE_PER_KM_XPF:-100}
      INITIAL_WALLET_BALANCE_XPF: ${INITIAL_WALLET_BALANCE_XPF:-10000}

      # CORS allowed origin = the frontend public domain (with https://)
      CORS_ORIGIN: https://${PUBLIC_DOMAIN:?PUBLIC_DOMAIN required in .env}

      PICKUP_MAX_DISTANCE_METERS:    ${PICKUP_MAX_DISTANCE_METERS:-50}
      DROPOFF_MIN_DELAY_SECONDS:     ${DROPOFF_MIN_DELAY_SECONDS:-30}
      NEARBY_DRIVERS_RADIUS_METERS:  ${NEARBY_DRIVERS_RADIUS_METERS:-3000}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - tahiti_net
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-n8n_default}"
      - "traefik.http.routers.tahitiride-backend.entrypoints=${TRAEFIK_ENTRYPOINT_HTTPS:-websecure}"
      - "traefik.http.routers.tahitiride-backend.rule=Host(`${PUBLIC_API_DOMAIN:?PUBLIC_API_DOMAIN required in .env}`)"
      - "traefik.http.routers.tahitiride-backend.tls.certresolver=${TRAEFIK_CERTRESOLVER:-mytlschallenge}"
      - "traefik.http.services.tahitiride-backend.loadbalancer.server.port=3001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # The PWA calls the API on the dedicated subdomain (cross-origin, secured by JWT + CORS)
        NUXT_PUBLIC_API_BASE:    https://${PUBLIC_API_DOMAIN}
        NUXT_PUBLIC_SOCKET_URL:  https://${PUBLIC_API_DOMAIN}
        NUXT_PUBLIC_MAPBOX_TOKEN: ${NUXT_PUBLIC_MAPBOX_TOKEN:?NUXT_PUBLIC_MAPBOX_TOKEN required in .env}
    image: tahiti-ride-frontend:latest
    container_name: tahiti_ride_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - tahiti_net
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-n8n_default}"
      - "traefik.http.routers.tahitiride-frontend.entrypoints=${TRAEFIK_ENTRYPOINT_HTTPS:-websecure}"
      - "traefik.http.routers.tahitiride-frontend.rule=Host(`${PUBLIC_DOMAIN}`)"
      - "traefik.http.routers.tahitiride-frontend.tls.certresolver=${TRAEFIK_CERTRESOLVER:-mytlschallenge}"
      - "traefik.http.services.tahitiride-frontend.loadbalancer.server.port=80"

volumes:
  pgdata:

networks:
  tahiti_net:
    driver: bridge
  traefik_net:
    external: true
    name: ${TRAEFIK_NETWORK:-n8n_default}
