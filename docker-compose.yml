services:
  db:
    image: postgis/postgis:16-3.4
    container_name: kartiki_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DATABASE_USER:-kartiki}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-kartiki}
      POSTGRES_DB:       ${DATABASE_NAME:-kartiki}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-kartiki} -d ${DATABASE_NAME:-kartiki}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - kartiki_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: kartiki-backend:latest
    container_name: kartiki_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001

      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER:     ${DATABASE_USER:-kartiki}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-kartiki}
      DATABASE_NAME:     ${DATABASE_NAME:-kartiki}

      JWT_SECRET:     ${JWT_SECRET:?JWT_SECRET is required in .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}

      MAPBOX_TOKEN: ${MAPBOX_TOKEN:-}

      FARE_BASE_XPF:              ${FARE_BASE_XPF:-0}
      FARE_PER_KM_XPF:            ${FARE_PER_KM_XPF:-100}
      APP_MARGIN_PER_KM_XPF:      ${APP_MARGIN_PER_KM_XPF:-0}
      INITIAL_WALLET_BALANCE_XPF: ${INITIAL_WALLET_BALANCE_XPF:-10000}

      # CORS allowed origin = the frontend public domain (with https://)
      CORS_ORIGIN: https://${PUBLIC_DOMAIN:?PUBLIC_DOMAIN required in .env}

      PICKUP_MAX_DISTANCE_METERS:    ${PICKUP_MAX_DISTANCE_METERS:-50}
      DROPOFF_MIN_DELAY_SECONDS:     ${DROPOFF_MIN_DELAY_SECONDS:-30}
      NEARBY_DRIVERS_RADIUS_METERS:  ${NEARBY_DRIVERS_RADIUS_METERS:-3000}

      # Admin bootstrap — optional. When BOOTSTRAP_ADMIN_EMAIL is set, the
      # backend creates or promotes this account to admin on every boot
      # (idempotent). Empty to opt out.
      BOOTSTRAP_ADMIN_EMAIL:    ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BOOTSTRAP_ADMIN_NAME:     ${BOOTSTRAP_ADMIN_NAME:-Administrator}

      # Certifications: persistent file storage and OCR provider config.
      # Uploaded licences / insurance vignettes / avatars live under
      # /app/uploads inside the container, mapped to a named volume so
      # they survive container rebuilds.
      UPLOAD_DIR: /app/uploads
      OPENAI_API_KEY:                ${OPENAI_API_KEY:-}
      OPENAI_VISION_MODEL:           ${OPENAI_VISION_MODEL:-gpt-4o-mini}
      OCR_NAME_SIMILARITY_THRESHOLD: ${OCR_NAME_SIMILARITY_THRESHOLD:-0.85}
      OCR_MIN_CONFIDENCE:            ${OCR_MIN_CONFIDENCE:-0.8}
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - kartiki_net
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-n8n_default}"
      - "traefik.http.routers.kartiki-backend.entrypoints=${TRAEFIK_ENTRYPOINT_HTTPS:-websecure}"
      - "traefik.http.routers.kartiki-backend.rule=Host(`${PUBLIC_API_DOMAIN:?PUBLIC_API_DOMAIN required in .env}`)"
      - "traefik.http.routers.kartiki-backend.tls.certresolver=${TRAEFIK_CERTRESOLVER:-mytlschallenge}"
      - "traefik.http.services.kartiki-backend.loadbalancer.server.port=3001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # The PWA calls the API on the dedicated subdomain (cross-origin, secured by JWT + CORS)
        NUXT_PUBLIC_API_BASE:    https://${PUBLIC_API_DOMAIN}
        NUXT_PUBLIC_SOCKET_URL:  https://${PUBLIC_API_DOMAIN}
        NUXT_PUBLIC_MAPBOX_TOKEN: ${NUXT_PUBLIC_MAPBOX_TOKEN:?NUXT_PUBLIC_MAPBOX_TOKEN required in .env}
    image: kartiki-frontend:latest
    container_name: kartiki_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - kartiki_net
      - traefik_net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-n8n_default}"
      - "traefik.http.routers.kartiki-frontend.entrypoints=${TRAEFIK_ENTRYPOINT_HTTPS:-websecure}"
      - "traefik.http.routers.kartiki-frontend.rule=Host(`${PUBLIC_DOMAIN}`)"
      - "traefik.http.routers.kartiki-frontend.tls.certresolver=${TRAEFIK_CERTRESOLVER:-mytlschallenge}"
      - "traefik.http.services.kartiki-frontend.loadbalancer.server.port=80"

volumes:
  pgdata:
  uploads:

networks:
  kartiki_net:
    driver: bridge
  traefik_net:
    external: true
    name: ${TRAEFIK_NETWORK:-n8n_default}
